<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Prompt', sans-serif;
            /* ใช้พื้นหลังโทนสีเข้ม-น้ำเงิน ให้ความรู้สึกแบบเทคโนโลยี/โปรแกรมเมอร์ */
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .portfolio-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
            transition: transform 0.3s ease;
        }
        .portfolio-card:hover {
            transform: translateY(-5px);
        }
        h1 {
            color: #1e293b;
            font-size: 24px;
            margin-bottom: 24px;
            font-weight: 600;
        }
        .info-box {
            background: #f1f5f9;
            border-left: 4px solid #3b82f6; /* เส้นขอบข้างสีฟ้าไอที */
            padding: 15px;
            margin: 12px 0;
            text-align: left;
            border-radius: 0 8px 8px 0;
        }
        p {
            font-size: 16px;
            color: #334155;
            line-height: 1.6;
        }
        .label {
            font-weight: 600;
            color: #3b82f6;
        }
    </style>
</head>
<body>

    <div class="portfolio-card">
        <h1>สวัสดีครับ ยินดีต้อนรับสู่พอร์ตของเก้า</h1>
        
        <div class="info-box">
            <p><span class="label">ชื่อ-นามสกุล :</span> นายชวนากร ใจเร็ว</p>
        </div>
        
        <div class="info-box">
            <p><span class="label">ตำแหน่ง :</span> นักศึกษาประจำแผนกวิชาเทคโนโลยีสารสนเทศ</p>
        </div>
    </div>

</body>
</html>
